name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    # Set up display for GUI testing on Linux
    - name: Set up display (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb herbstluftwm
        export DISPLAY=:99.0
        Xvfb :99 -screen 0 1400x900x24 -ac +extension GLX +render &
        sleep 3
        herbstluftwm &
        sleep 1
      env:
        DISPLAY: :99.0

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --dev

    - name: Install phylib from branch
      if: github.ref_name == 'master' || github.ref_name == 'dev'
      run: uv add "git+https://github.com/cortex-lab/phylib.git@${{ github.ref_name }}"

    - name: Install additional test dependencies
      run: |
        uv add "git+https://github.com/kwikteam/klusta.git"
        uv add --no-build-isolation "git+https://github.com/kwikteam/klustakwik2.git"

    - name: Lint with ruff
      run: uv run ruff check phy

    - name: Check formatting with ruff
      run: uv run ruff format --check phy

    - name: Test with pytest
      run: uv run pytest --cov=phy --cov-report=xml phy
      env:
        DISPLAY: ${{ runner.os == 'Linux' && ':99.0' || '' }}
        QT_QPA_PLATFORM: offscreen

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.10

    - name: Build package
      run: uv build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"

    - name: Set up Python
      run: uv python install 3.10

    - name: Install dependencies
      run: uv sync --dev

    - name: Generate and validate documentation
      run: make doc-check
