name: phy2
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - git
  - numpy
  - matplotlib
  - scipy
  - h5py
  - pyqt
  - pyopengl>=3.1.9
  - pyqtwebengine
  - pytest
  - qtconsole
  - requests
  - responses
  - traitlets
  - pillow
  - joblib
  - pip:
    - git+https://github.com/cortex-lab/phy.git
